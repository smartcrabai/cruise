name: Cruise

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  cruise:
    # Coarse pre-filter so unrelated events don't even spin up a runner; the
    # action re-checks the trigger phrase (word-boundary match) and actor
    # permissions itself before doing anything.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@cruise')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.title, '@cruise') || contains(github.event.issue.body, '@cruise'))) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@cruise')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@cruise'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      # Needed to exchange this job's OIDC token for a cruise-agent GitHub
      # App installation token (see docs/github-actions.md). Safe to remove
      # if you don't use the App (the action falls back to GITHUB_TOKEN).
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: smartcrabai/cruise@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
