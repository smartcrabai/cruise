name: Lint Docker

on:
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/docker-publish.yml'
      - '.github/workflows/lint-docker.yml'
      - 'scripts/test_docker_config.sh'

jobs:
  validate-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Validate Docker config file structure
        run: bash scripts/test_docker_config.sh

  hadolint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Lint Dockerfile with hadolint
        # Ignores DL3008 (pin apt package versions) - versions are managed by
        # the base image; DL3009 (delete apt lists) is handled in the same RUN.
        run: |
          docker run --rm \
            -v "$PWD/Dockerfile:/Dockerfile:ro" \
            hadolint/hadolint:v2.12.0 \
            hadolint \
              --ignore DL3008 \
              /Dockerfile

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install actionlint
        run: |
          ACTIONLINT_VERSION=1.7.7
          mkdir -p "$RUNNER_TEMP/bin"
          curl -fsSL \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP/bin" actionlint
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
      - name: Lint workflow files with actionlint
        run: actionlint .github/workflows/docker-publish.yml .github/workflows/lint-docker.yml
